<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print AR Marker — ARUCO id 0</title>
<style>
  body { font-family:'Segoe UI',sans-serif; text-align:center; padding:24px; color:#222; }
  h1 { font-size:20px; } p { color:#555; max-width:520px; margin:8px auto; }
  #marker { width:320px; height:320px; margin:20px auto; }
  #marker svg { width:100%; height:100%; }
  button { background:#2e7d32; color:#fff; border:none; padding:12px 20px; border-radius:8px;
    font-size:15px; cursor:pointer; margin-top:10px; }
  @media print { .noprint { display:none; } #marker { width:90mm; height:90mm; } }
</style>
</head>
<body>
  <h1 class="noprint">AR Marker — ARUCO dictionary, id 0</h1>
  <p class="noprint">Print this marker, then place it flat on or beside the circuit board.
     Keep it fully visible to the camera. A larger print tracks better.</p>
  <div id="marker">loading…</div>
  <button class="noprint" onclick="window.print()">🖨 Print marker</button>

  <script src="https://cdn.jsdelivr.net/npm/js-aruco2@2.0.0/src/aruco.min.js"></script>
  <script>
    // Generate the exact marker the app's detector expects (ARUCO id 0).
    const dict = new AR.Dictionary('ARUCO');
    document.getElementById('marker').innerHTML = dict.generateSVG(0);
  </script>
</body>
</html>
